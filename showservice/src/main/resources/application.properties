# Set the server port and application name
server.port=8082
spring.application.name=showservice

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/shows_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
